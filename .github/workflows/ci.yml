name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    name: Typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run project checks
        run: pnpm check

  commits:
    name: Commit message policy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate PR title for squash merge
        if: github.event_name == 'pull_request'
        run: |
          tmp_file="$(mktemp)"
          printf '%s\n' "${{ github.event.pull_request.title }}" > "$tmp_file"
          python3 scripts/validate-commit-scope.py --repo "$PWD" header "$tmp_file"

      - name: Validate commit messages in pull request
        if: github.event_name == 'pull_request'
        run: ./scripts/check-commit-messages.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

      - name: Validate commit messages in push
        if: github.event_name == 'push'
        run: ./scripts/check-commit-messages.sh "${{ github.event.before }}" "${{ github.sha }}"
